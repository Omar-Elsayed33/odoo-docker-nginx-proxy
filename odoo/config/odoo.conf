; ─────────────────────────────────────────────────────────────────────
; Odoo server configuration
;
; This file is mounted into the container at /etc/odoo/odoo.conf and
; is read by the default Odoo entrypoint on startup. Keep it tracked
; in git, BUT do not commit production secrets — see admin_passwd
; below for how to handle that.
;
; Reference: https://www.odoo.com/documentation/18.0/administration/on_premise/deploy.html
; ─────────────────────────────────────────────────────────────────────

[options]

; ─── Master / admin password ─────────────────────────────────────────
; Protects the database manager at /web/database/*. Anyone with this
; password can create, drop, dump, or restore databases.
;
; LEAVE THIS PLACEHOLDER IN VERSION CONTROL. Before deploying:
;   1. Generate a strong value:  openssl rand -base64 32
;   2. Replace CHANGE_ME below in your deployed copy of this file
;      (e.g. via your deploy tool, Ansible, sed in your CI pipeline)
;      OR mount a separate odoo.conf at deploy time that overrides this.
;   3. Never commit the real password.
admin_passwd = CHANGE_ME

; ─── Addons paths ────────────────────────────────────────────────────
; Comma-separated, in priority order. The first path is Odoo's own
; built-in addons (baked into the image). The second is the host-
; mounted directory where your custom modules live (./odoo/addons).
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons

; ─── Data directory ──────────────────────────────────────────────────
; Filestore, sessions, addons cache. Backed by the odoo-data named
; volume. Do not change without also updating docker-compose.yml.
data_dir = /var/lib/odoo

; ─── Database connection ─────────────────────────────────────────────
; HOST / PORT / USER / PASSWORD are injected by the Odoo Docker
; entrypoint from the container's environment, so they intentionally
; aren't repeated here. The values below only matter as defaults if
; the entrypoint env vars are missing.
db_host = db
db_port = 5432
db_user = odoo
; db_password: see PASSWORD env var in docker-compose.yml
; db_sslmode: leave as the libpq default for now; tighten when the
; database is moved off-host.

; ─── Database manager ────────────────────────────────────────────────
; list_db = True lets the database selector UI work, which you need
; on first boot to create your initial database. AFTER initial setup,
; set this to False AND block /web/database/* at the reverse proxy.
list_db = True

; ─── HTTP / longpolling ──────────────────────────────────────────────
; Two separate ports: xmlrpc_port serves HTTP, gevent_port serves the
; longpolling/websocket worker. Both are published in docker-compose.
xmlrpc_port = 8069
gevent_port = 8072

; ─── Proxy mode ──────────────────────────────────────────────────────
; True because Odoo sits behind the nginx reverse proxy defined in
; docker-compose.yml. Nginx forwards X-Forwarded-Proto / -Host / -For,
; and Odoo uses those headers to generate correct URLs (https://, real
; client IP in logs, etc.).
;
; DANGER: Setting this to True without a trusted proxy in front lets
; clients spoof X-Forwarded-Proto and bypass HTTPS-only logic. Only
; flip back to False if you remove the nginx layer entirely.
proxy_mode = True

; ─── Workers ─────────────────────────────────────────────────────────
; Rule of thumb: workers = (2 × CPU) + 1. Set to 0 for "threaded"
; single-process mode, which is fine for local dev but not for prod.
; Tune in concert with limit_memory_* and your host's RAM.
workers = 3

; ─── Resource limits (per worker) ────────────────────────────────────
; A worker that crosses limit_memory_hard is killed; one that crosses
; limit_memory_soft is recycled gracefully after the current request.
; Defaults below assume ~1 GB per worker. Adjust to your host.
;
; IMPORTANT: Odoo's config parser does NOT strip inline comments after
; values. Every comment must live on its own line ABOVE the option,
; never trailing the value, or Odoo will crash on startup with
; OptionValueError: invalid integer value for "<option>".

; Soft memory cap per worker, in bytes (640 MB).
; Worker is recycled gracefully after the current request when crossed.
limit_memory_soft = 671088640

; Hard memory cap per worker, in bytes (768 MB).
; Worker is killed immediately when crossed.
limit_memory_hard = 805306368

; CPU seconds a worker may spend on a single request before being killed.
limit_time_cpu = 60

; Wall-clock seconds a worker may spend on a single request before being killed.
limit_time_real = 120

; Wall-clock limit for cron jobs. 0 disables the limit entirely.
limit_time_real_cron = 0

; Number of requests a worker handles before being recycled.
limit_request = 8192

; ─── Logging ─────────────────────────────────────────────────────────
; logfile = False sends logs to stdout, which Docker captures and
; forwards to the configured logging driver (json-file by default,
; with rotation set in docker-compose.yml).
logfile = False
log_level = info
log_handler = :INFO

; ─── Misc ────────────────────────────────────────────────────────────
; without_demo = all skips demo data on database creation. Strongly
; recommended for any database you might one day put into production.
without_demo = all
