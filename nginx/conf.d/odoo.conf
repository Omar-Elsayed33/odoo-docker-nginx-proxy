# ─────────────────────────────────────────────────────────────────────
# nginx/conf.d/odoo.conf  —  Odoo reverse-proxy vhost
#
# This file is the public-facing entry point for the Odoo stack:
#
#     client ──► nginx :443 ──► odoo :8069 (HTTP)
#                              └► odoo :8072 (longpolling / websocket)
#
# Architecture choices:
#   - Static vhost (not envsubst). The domain is set in server_name
#     below; replace it in your deployed copy or template via your
#     deploy tool. Reasoning: envsubst on the full vhost makes the
#     real running config invisible to git diff.
#   - Reusable concerns live in /etc/nginx/templates/*.conf and are
#     included by name. Keeps this vhost short and lets new vhosts
#     reuse the same snippets without copy-paste.
#   - Two server blocks: port 80 (redirect + ACME challenge) and
#     port 443 (the real listener). Standard TLS-redirect pattern.
#
# Required mounts (see docker-compose.yml):
#   /etc/nginx/conf.d/                     this file
#   /etc/nginx/templates/                  shared snippets
#   /etc/nginx/certs/fullchain.pem         TLS chain
#   /etc/nginx/certs/privkey.pem           TLS private key
# ─────────────────────────────────────────────────────────────────────


# ─── Upstreams ───────────────────────────────────────────────────────
# Two upstreams because Odoo uses two ports: 8069 for HTTP and 8072
# for the gevent-based longpolling / websocket worker. The bus
# (chat, notifications) won't work without the websocket upstream.
#
# To scale horizontally, add more `server` lines here (and put a
# session-affinity hash on $remote_addr or use sticky cookies):
#     server odoo-1:8069;
#     server odoo-2:8069;
upstream odoo_http {
    server odoo:8069;
    keepalive 32;
}

upstream odoo_longpolling {
    server odoo:8072;
    keepalive 32;
}


# ─── Websocket upgrade map ───────────────────────────────────────────
# Translates the client's Upgrade header into a Connection value that
# nginx can forward. Required for /websocket and /longpolling to work.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}


# ─── Rate-limit zones (defined now, enforced in v0.4 hardening) ──────
# Sized at 10 MB which tracks ~160k unique IPs. Keep the zone defined
# even before enforcement so the runtime config is stable when limits
# are turned on later.
limit_req_zone $binary_remote_addr zone=odoo_login:10m  rate=5r/s;
limit_req_zone $binary_remote_addr zone=odoo_general:10m rate=30r/s;


# ─────────────────────────────────────────────────────────────────────
# Port 80  —  ACME challenge + HTTPS redirect
# ─────────────────────────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name _;

    # Lightweight healthcheck used by the container's healthcheck.
    # Lives on port 80 so it doesn't depend on valid TLS certs.
    location = /nginx-health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Let's Encrypt / certbot HTTP-01 challenges (wired up in v0.5).
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else: permanent redirect to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}


# ─────────────────────────────────────────────────────────────────────
# Port 443  —  the real listener
# ─────────────────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;

    # CHANGE_ME for production — set to your real domain (matches
    # DOMAIN in .env). Using `_` makes this vhost the default catch-
    # all on port 443, which is fine for a single-app deployment but
    # not for shared hosts.
    server_name _;

    # ── TLS material ─────────────────────────────────────────────────
    # Mount real certificates over these paths via docker-compose.
    # See nginx/certs/README.md for cert provisioning (self-signed
    # for local dev; Let's Encrypt in v0.5).
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # ── Shared concerns (pulled from /etc/nginx/templates/) ─────────
    include /etc/nginx/templates/ssl-params.conf;
    include /etc/nginx/templates/security-headers.conf;
    include /etc/nginx/templates/gzip.conf;
    include /etc/nginx/templates/proxy-params.conf;

    # ── Upload size ─────────────────────────────────────────────────
    # Odoo attachments, imported CSVs, module uploads. Tune via .env.
    client_max_body_size 200M;

    # ── Logs ────────────────────────────────────────────────────────
    access_log /var/log/nginx/odoo.access.log;
    error_log  /var/log/nginx/odoo.error.log warn;

    # ── Websocket (Odoo 16+) ────────────────────────────────────────
    # The bus/chat/longpolling system. MUST upgrade the connection or
    # users will see "Disconnected" banners and missed notifications.
    location = /websocket {
        proxy_pass         http://odoo_longpolling;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        # Long timeouts: a websocket is intentionally a long-lived
        # connection. Default proxy_read_timeout (60s) would kill it.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Legacy longpolling path (Odoo <= 15 compat) ─────────────────
    location /longpolling/ {
        proxy_pass         http://odoo_longpolling;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 3600s;
    }

    # ── Static assets ───────────────────────────────────────────────
    # Cache addon-served static files at the proxy. Saves a worker
    # round-trip on every CSS/JS/image request — meaningful on cold
    # page loads.
    location ~* ^/web/(static|content|image)/ {
        proxy_pass         http://odoo_http;
        proxy_cache_valid  200 60m;
        proxy_buffering    on;
        expires            10d;
        add_header         Cache-Control "public, max-age=864000";
    }

    # ── Main application ────────────────────────────────────────────
    location / {
        proxy_pass    http://odoo_http;
        proxy_redirect off;

        # Hand Odoo a true picture of the request so URL generation,
        # CORS, and HTTPS detection all work. Requires
        # `proxy_mode = True` in odoo.conf — set there already.
    }
}
