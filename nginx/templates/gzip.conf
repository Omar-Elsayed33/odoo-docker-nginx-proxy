# ─────────────────────────────────────────────────────────────────────
# gzip.conf  —  response compression
#
# Compresses text/* responses on the way out. Odoo emits a lot of
# uncompressed JSON-RPC and HTML; gzip typically cuts page weight by
# 70–80% with negligible CPU cost at level 5.
#
# Not compressed: images and pre-compressed bundles (Odoo's web
# assets already ship minified; recompressing rarely wins more than
# a percent and burns CPU).
# ─────────────────────────────────────────────────────────────────────

gzip              on;
gzip_vary         on;
gzip_proxied      any;
gzip_comp_level   5;
gzip_min_length   1024;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/javascript
    application/json
    application/xml
    application/xml+rss
    application/rss+xml
    application/atom+xml
    application/wasm
    image/svg+xml
    font/ttf
    font/otf;

# Disable gzip for ancient IE6 (still a default in many configs;
# harmless and documents intent).
gzip_disable "msie6";
