# ─────────────────────────────────────────────────────────────────────
# proxy-params.conf  —  forwarded headers + proxy buffering
#
# Included from any HTTPS server block that proxies to Odoo. These
# headers tell Odoo (and any addon that inspects the request) what
# the *client* asked for, not what nginx asked for. Odoo's
# `proxy_mode = True` only trusts these when they arrive from a
# trusted proxy — which means: do NOT mount this snippet behind
# another untrusted proxy without overriding X-Forwarded-For.
# ─────────────────────────────────────────────────────────────────────

# ── Forwarded request metadata ───────────────────────────────────────
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $remote_addr;
proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host  $host;
proxy_set_header X-Forwarded-Port  $server_port;

# ── Proxy protocol version ───────────────────────────────────────────
# HTTP/1.1 is required for keepalive and websocket upgrades.
proxy_http_version 1.1;

# ── Buffering ────────────────────────────────────────────────────────
# Odoo emits large HTML bodies on initial loads. Generous buffers
# avoid spilling to disk under normal load. Tune if you see
# "an upstream response is buffered to a temporary file" in error.log.
proxy_buffers       16 64k;
proxy_buffer_size   128k;
proxy_busy_buffers_size 128k;

# ── Timeouts ─────────────────────────────────────────────────────────
# Generous enough for slow report rendering, strict enough that a
# hung worker doesn't tie up a connection forever. Longpolling /
# websocket locations override these to be much higher.
proxy_connect_timeout 60s;
proxy_send_timeout    300s;
proxy_read_timeout    300s;

# ── Misc ─────────────────────────────────────────────────────────────
# Don't expose upstream errors directly to the client.
proxy_intercept_errors off;
# Don't pass nginx's Server header through.
proxy_hide_header X-Powered-By;
