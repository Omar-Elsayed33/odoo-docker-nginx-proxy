# ─────────────────────────────────────────────────────────────────────
# ssl-params.conf  —  TLS protocol, cipher, and session config
#
# Targets Mozilla's "intermediate" profile: broad client support
# (browsers from ~2018 onward) with no known-weak ciphers and TLS 1.3
# preferred. Update from
# https://ssl-config.mozilla.org/#server=nginx&config=intermediate
# when their generator rolls forward — usually once a year.
#
# Do not include this snippet on plain-HTTP server blocks; the
# directives below have no meaning without `listen ... ssl`.
# ─────────────────────────────────────────────────────────────────────

# ── Protocols ────────────────────────────────────────────────────────
# Explicitly drop TLS 1.0 / 1.1 — both deprecated and unsafe.
ssl_protocols TLSv1.2 TLSv1.3;

# ── Ciphers (TLS 1.2 only; 1.3 has its own fixed suite list) ────────
# Forward secrecy mandatory (ECDHE / DHE). AEAD only (GCM, ChaCha20).
ssl_prefer_server_ciphers off;
ssl_ciphers "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";

# ── Session resumption ───────────────────────────────────────────────
# Shared cache reduces TLS handshake cost for repeat visitors. Tickets
# off because rotating them safely requires extra work; session cache
# is sufficient for a single-node deployment.
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# ── OCSP stapling ────────────────────────────────────────────────────
# Off by default because it requires a real CA-signed cert (won't work
# with self-signed) and a chain that includes the issuer cert. Turn
# this on once you have a Let's Encrypt cert installed:
#
#   ssl_stapling           on;
#   ssl_stapling_verify    on;
#   ssl_trusted_certificate /etc/nginx/certs/fullchain.pem;
#   resolver               1.1.1.1 8.8.8.8 valid=300s;
#   resolver_timeout       5s;
