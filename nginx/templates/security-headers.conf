# ─────────────────────────────────────────────────────────────────────
# security-headers.conf  —  defensive response headers
#
# `always` ensures these headers are set on non-2xx responses too
# (4xx error pages, 3xx redirects). Without `always`, a 401 from
# Odoo would be served without HSTS, leaving a downgrade window.
#
# Notable omission: Content-Security-Policy. Odoo's frontend uses
# inline scripts/styles and eval() in several places, so a strict
# CSP breaks the UI. Crafting a workable policy is per-deployment
# work and lives outside the base config.
# ─────────────────────────────────────────────────────────────────────

# ── HSTS ─────────────────────────────────────────────────────────────
# 2 years, applies to subdomains, eligible for the HSTS preload list.
# Only add `preload` once you're certain HTTPS will stay on forever
# for this domain AND every subdomain — there is no quick rollback.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

# ── MIME-type sniffing ───────────────────────────────────────────────
add_header X-Content-Type-Options "nosniff" always;

# ── Clickjacking ─────────────────────────────────────────────────────
# Odoo embeds its own UI in iframes for some widgets (Studio, kanban
# previews), so DENY would break the app. SAMEORIGIN is the right
# balance.
add_header X-Frame-Options "SAMEORIGIN" always;

# ── Referrer leakage ─────────────────────────────────────────────────
# Send the full URL only on same-origin requests; just the origin
# cross-origin. Good default for an app that may link out to invoices,
# payment providers, etc.
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# ── Browser feature opt-outs ─────────────────────────────────────────
# Odoo doesn't need the camera, mic, geolocation, etc. by default.
# Loosen this for specific addons that genuinely need it.
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=()" always;

# ── Cross-Origin policies ────────────────────────────────────────────
# Conservative defaults. If you embed Odoo in a third-party site or
# use cross-origin window messaging, you'll need to relax these.
add_header Cross-Origin-Opener-Policy   "same-origin" always;
add_header Cross-Origin-Resource-Policy "same-site"   always;

# ── Hide identifying server info ─────────────────────────────────────
# `server_tokens off` in the http context hides the nginx version
# from the Server header (set in nginx.conf). To hide the product
# name entirely (`Server: nginx` → no header at all) you need the
# `headers-more` module, which is NOT in the stock nginx:alpine
# image. Build a custom image based on `openresty` or `nginx` with
# `nginx-module-headersmore` if you want that.
