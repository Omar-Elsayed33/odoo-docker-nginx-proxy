; ─────────────────────────────────────────────────────────────────────
; pgbouncer.ini — connection pool between Odoo and PostgreSQL
;
; Mounted into the container at /etc/pgbouncer/pgbouncer.ini (ro).
;
; This is the source of truth for pool behavior. To change a value,
; edit this file and reload PgBouncer:
;     docker compose exec pgbouncer pgbouncer -R /etc/pgbouncer/pgbouncer.ini
; or restart the service. (PgBouncer's online reload supports most,
; but not all, of these settings — restart if reload reports errors.)
;
; See docs/pgbouncer.md for tuning rationale.
; ─────────────────────────────────────────────────────────────────────

[databases]
; ─── Database routing ────────────────────────────────────────────────
; The wildcard `*` matches any database name the client requests, so
; Odoo can create new databases (via /web/database/manager) without
; touching this file. The connection always lands on the `db` service
; (Postgres) on the internal Docker network.
;
; If you want to expose only one DB (a hardening measure that prevents
; clients from probing other DBs on the cluster), replace the line
; with an explicit mapping:
;     mydb = host=db port=5432 dbname=mydb
* = host=db port=5432


[pgbouncer]
; ─── Listening address ───────────────────────────────────────────────
; Bind to all interfaces inside the container. Not exposed to the
; host — the `expose` (not `ports`) in docker-compose.yml means only
; services on `odoo-net` can reach this.
listen_addr = 0.0.0.0
listen_port = 6432
unix_socket_dir =


; ─── Authentication ──────────────────────────────────────────────────
; scram-sha-256 is the modern standard. PgBouncer >= 1.18 accepts
; plaintext entries in userlist.txt and hashes them in memory at
; startup, so you do not need to pre-compute SCRAM hashes by hand.
;
; PgBouncer → Postgres authentication uses the same credentials the
; client supplied (no separate server-side user), and Postgres in
; this stack is also configured for SCRAM, so the handshake is
; SCRAM end-to-end.
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt


; ─── Pool mode ───────────────────────────────────────────────────────
; transaction = a backend connection is returned to the pool at the
; end of every transaction. This is the right default for Odoo:
;   - Odoo opens many short-lived connections (one per request).
;   - The ORM does not rely on session state across transactions.
;   - Pooled connections amortise Postgres backend startup cost.
;
; CAVEAT: transaction mode breaks LISTEN/NOTIFY, WITH HOLD cursors,
; and server-side prepared statements that outlive a transaction.
; See docs/pgbouncer.md → "LISTEN/NOTIFY and the bus" for details
; and how to bypass the pool for the longpolling worker if needed.
pool_mode = transaction


; ─── Pool sizing ─────────────────────────────────────────────────────
; These four numbers are the ones you'll actually tune. Quick math:
;
;   peak required backends = workers × concurrent_tx_per_worker
;
; For a single Odoo with 3 HTTP workers + 1 longpolling worker, each
; doing at most ~3 concurrent transactions during a load spike,
; you'd need ~12 backends — well within default_pool_size = 25.
;
; max_db_connections caps total Postgres backends across all pools,
; preventing PgBouncer from saturating Postgres' max_connections.

max_client_conn       = 200
default_pool_size     = 25
reserve_pool_size     = 5
reserve_pool_timeout  = 5
max_db_connections    = 100
max_user_connections  = 100


; ─── Server-side timeouts ────────────────────────────────────────────
; server_lifetime forces every pooled backend to be recycled after
; this many seconds. Catches slow leaks (memory, stale prepared
; statements). 1 hour is a reasonable balance — high enough that
; backends stay warm, low enough that leaks don't accumulate.
server_lifetime         = 3600
server_idle_timeout     = 600
server_connect_timeout  = 15
server_login_retry      = 15


; ─── Client-side timeouts ────────────────────────────────────────────
; client_idle_timeout = 0 lets Odoo's longpolling workers hold a
; connection open indefinitely (they should, since they're blocking
; on the bus). query_wait_timeout aborts a client that's been waiting
; for a backend slot for too long — better to fail fast than to pile
; up frontends when the pool is exhausted.
client_idle_timeout     = 0
client_login_timeout    = 60
query_timeout           = 0
query_wait_timeout      = 120


; ─── Startup parameter passthrough ───────────────────────────────────
; psycopg2 / Odoo set these on every new connection. In transaction
; mode, PgBouncer can't always replay startup parameters reliably,
; so we tell it to ignore them rather than reject the connection.
;   - extra_float_digits: Odoo sets =3 for full float precision
;   - options: catch-all for various libpq escape hatches
;   - search_path: psycopg2 sometimes pins it
ignore_startup_parameters = extra_float_digits,options,search_path


; ─── Admin & stats users ─────────────────────────────────────────────
; Users allowed to connect to the special `pgbouncer` virtual DB and
; run admin commands (PAUSE, RESUME, RELOAD, SHOW STATS).
;
; These names must also appear in userlist.txt to actually log in.
; PgBouncer does NOT perform env-var substitution in this file, so
; the username below is a literal. Change `odoo` here if you change
; POSTGRES_USER in .env.
;
; The admin role is intentionally empty by default — uncomment and
; add a dedicated entry to userlist.txt only when you need it.
;admin_users = pgbouncer_admin
stats_users  = odoo


; ─── Logging ─────────────────────────────────────────────────────────
; Logs go to stdout (captured by Docker's json-file driver, which is
; rotated 10 MB × 5 — see docker-compose.yml).
log_connections     = 1
log_disconnections  = 1
log_pooler_errors   = 1
stats_period        = 60


; ─── Process ─────────────────────────────────────────────────────────
; PgBouncer runs in the foreground as PID 1 by default — exactly
; what Docker wants. (The `daemon` config setting was removed in
; PgBouncer 1.25; use the `-d` command-line flag if you ever need
; daemon mode outside a container.)
